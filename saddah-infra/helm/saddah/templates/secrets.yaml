{{- if and .Values.api.enabled .Values.api.secrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.api.name }}-secrets
  namespace: {{ include "saddah.namespace" . }}
  labels:
    {{- include "saddah.api.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range $key, $value := .Values.api.secrets.data }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
{{- end }}
