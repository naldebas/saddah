{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "saddah.fullname" . }}
  namespace: {{ include "saddah.namespace" . }}
  labels:
    {{- include "saddah.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
    {{- if $.Values.ingress.tls.enabled }}
    alb.ingress.kubernetes.io/certificate-arn: {{ $.Values.ingress.tls.certificateArn | quote }}
    {{- end }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    {{- if .Values.api.enabled }}
    - host: {{ .Values.ingress.hosts.api.host }}
      http:
        paths:
          {{- range .Values.ingress.hosts.api.paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $.Values.api.name }}
                port:
                  number: {{ $.Values.api.service.port }}
          {{- end }}
    {{- end }}
    {{- if .Values.web.enabled }}
    - host: {{ .Values.ingress.hosts.web.host }}
      http:
        paths:
          {{- range .Values.ingress.hosts.web.paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $.Values.web.name }}
                port:
                  number: {{ $.Values.web.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
