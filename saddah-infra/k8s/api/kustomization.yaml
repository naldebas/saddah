apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: saddah-api

namespace: saddah

labels:
  - pairs:
      app.kubernetes.io/name: saddah-api
      app.kubernetes.io/part-of: saddah
      app.kubernetes.io/managed-by: kustomize

resources:
  - deployment.yaml
  - service.yaml
  - configmap.yaml
  - hpa.yaml
  # Note: secret.yaml should be managed separately with External Secrets or sealed-secrets
  # - secret.yaml

commonLabels:
  environment: dev

images:
  - name: saddah-api
    newName: ${AWS_ACCOUNT_ID}.dkr.ecr.me-south-1.amazonaws.com/saddah-api
    newTag: latest
