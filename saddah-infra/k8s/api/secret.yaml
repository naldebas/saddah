# IMPORTANT: This is a TEMPLATE file. Do NOT commit actual secrets!
# Use External Secrets Operator or AWS Secrets Manager in production.
# Values shown are base64 encoded placeholders.
apiVersion: v1
kind: Secret
metadata:
  name: saddah-api-secrets
  namespace: saddah
  labels:
    app: saddah-api
    component: backend
type: Opaque
stringData:
  # Database connection (from AWS RDS)
  DATABASE_URL: "postgresql://saddah_user:CHANGE_ME@saddah-db.xxxxx.me-south-1.rds.amazonaws.com:5432/saddah?schema=public"

  # Redis password (from AWS ElastiCache)
  REDIS_PASSWORD: "CHANGE_ME"

  # JWT secrets - generate with: openssl rand -base64 64
  JWT_SECRET: "CHANGE_ME_GENERATE_SECURE_SECRET"
  JWT_REFRESH_SECRET: "CHANGE_ME_GENERATE_SECURE_SECRET"

  # Encryption key for sensitive data
  ENCRYPTION_KEY: "CHANGE_ME_32_BYTE_HEX_STRING"

  # OpenAI API key (for AI features)
  OPENAI_API_KEY: "sk-CHANGE_ME"

  # Twilio credentials (for WhatsApp)
  TWILIO_ACCOUNT_SID: "ACCHANGE_ME"
  TWILIO_AUTH_TOKEN: "CHANGE_ME"
  TWILIO_WHATSAPP_NUMBER: "+1CHANGE_ME"

  # Meta WhatsApp credentials (alternative to Twilio)
  META_ACCESS_TOKEN: "CHANGE_ME"
  META_PHONE_NUMBER_ID: "CHANGE_ME"
  META_VERIFY_TOKEN: "CHANGE_ME"
  META_APP_SECRET: "CHANGE_ME"
---
