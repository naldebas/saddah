apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: saddah

resources:
  - ../../

commonLabels:
  environment: prod

# Production replica counts
replicas:
  - name: saddah-api
    count: 3
  - name: saddah-web
    count: 2

# Production image tags (use specific version, not latest)
images:
  - name: saddah-api
    newTag: v1.0.0
  - name: saddah-web
    newTag: v1.0.0

# Production-specific patches
patches:
  # Higher resource limits for production
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: saddah-api
      spec:
        template:
          spec:
            containers:
              - name: api
                resources:
                  requests:
                    cpu: "200m"
                    memory: "512Mi"
                  limits:
                    cpu: "1000m"
                    memory: "1Gi"
  # Update HPA for production
  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: saddah-api
      spec:
        minReplicas: 3
        maxReplicas: 20
