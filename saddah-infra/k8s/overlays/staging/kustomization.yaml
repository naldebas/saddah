apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: saddah

resources:
  - ../../

commonLabels:
  environment: staging

# Staging replica counts (between dev and prod)
replicas:
  - name: saddah-api
    count: 2
  - name: saddah-web
    count: 2

# Staging image tags
images:
  - name: saddah-api
    newTag: staging
  - name: saddah-web
    newTag: staging

# Staging-specific patches
patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: saddah-api
      spec:
        template:
          spec:
            containers:
              - name: api
                resources:
                  requests:
                    cpu: "100m"
                    memory: "256Mi"
                  limits:
                    cpu: "500m"
                    memory: "512Mi"
