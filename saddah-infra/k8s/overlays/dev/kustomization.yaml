apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: saddah

resources:
  - ../../

commonLabels:
  environment: dev

# Dev-specific replica counts
replicas:
  - name: saddah-api
    count: 1
  - name: saddah-web
    count: 1

# Dev-specific image tags
images:
  - name: saddah-api
    newTag: dev
  - name: saddah-web
    newTag: dev

# Dev-specific patches
patches:
  # Reduce resource limits for dev
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: saddah-api
      spec:
        template:
          spec:
            containers:
              - name: api
                resources:
                  requests:
                    cpu: "50m"
                    memory: "128Mi"
                  limits:
                    cpu: "200m"
                    memory: "256Mi"
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: saddah-web
      spec:
        template:
          spec:
            containers:
              - name: web
                resources:
                  requests:
                    cpu: "25m"
                    memory: "32Mi"
                  limits:
                    cpu: "100m"
                    memory: "64Mi"
