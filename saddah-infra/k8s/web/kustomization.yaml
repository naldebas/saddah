apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: saddah-web

namespace: saddah

labels:
  - pairs:
      app.kubernetes.io/name: saddah-web
      app.kubernetes.io/part-of: saddah
      app.kubernetes.io/managed-by: kustomize

resources:
  - deployment.yaml
  - service.yaml
  - configmap.yaml
  - hpa.yaml

commonLabels:
  environment: dev

images:
  - name: saddah-web
    newName: ${AWS_ACCOUNT_ID}.dkr.ecr.me-south-1.amazonaws.com/saddah-web
    newTag: latest
