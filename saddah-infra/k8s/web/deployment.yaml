apiVersion: apps/v1
kind: Deployment
metadata:
  name: saddah-web
  namespace: saddah
  labels:
    app: saddah-web
    component: frontend
    part-of: saddah
spec:
  replicas: 2
  selector:
    matchLabels:
      app: saddah-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: saddah-web
        component: frontend
    spec:
      containers:
        - name: web
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.me-south-1.amazonaws.com/saddah-web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: false  # nginx needs root for binding to port 80
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
      volumes:
        - name: nginx-config
          configMap:
            name: saddah-web-nginx
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - saddah-web
                topologyKey: kubernetes.io/hostname
